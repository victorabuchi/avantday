app-id: io.avantday.Avantday
runtime: org.freedesktop.Platform
runtime-version: '21.08'
sdk: org.freedesktop.Sdk
command: avantday_flutter
separate-locales: false
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --share=network
  - --device=all
modules:
  - name: avantday
    buildsystem: simple
    build-commands:
      # - ls .
      - cp -r avantday /app/avantday
      - chmod +x /app/avantday/avantday_flutter
      - install -Dm644 logo.svg /app/share/icons/hicolor/scalable/apps/io.avantday.Avantday.svg
      - mkdir /app/bin
      - ln -s /app/avantday/avantday_flutter /app/bin/avantday_flutter
      - install -Dm644 io.avantday.Avantday.desktop /app/share/applications/io.avantday.Avantday.desktop
    sources:
      - type: archive
        url: https://github.com/Avantday-IO/avantday/releases/download/0.0.2/Avantday-linux-x86.tar.gz
        sha256: b0dbe669bb9f34a65171adecaf61b02578bab5214d18a54009f0e4ec10665711
        dest: avantday
      - type: file
        path: io.avantday.Avantday.desktop
      - type: file
        path: logo.svg

